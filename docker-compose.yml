services:
  gaia:
    build:
      context: .
      dockerfile: Dockerfile
    image: gaia-pipeline:ubuntu-dev
    pull_policy: build
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "18080:18080"
      - "18081:18081"
      - "19080:19080"
    stdin_open: true
    tty: true
    command: ["sh", "runner/start.sh"]
